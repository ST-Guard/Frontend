<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Data | Gestor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="./../../css/dashboard.css">
    <link rel="stylesheet" href="./../../css/dashServidor.css" />
    <script src="./../../js/dashGestor.js"></script>
    <script src="./../../js/sessao.js"></script>
    <link rel="icon" href="./../../assets/icon/icon.png">

</head>

<body>
    <header>
        <nav>
            <div class="logo-nav" onclick="fnNavegar('/')">
                <img src="./../../assets/logos/smart data branco.png" alt="">
            </div>
            <div class="right-nav">
                <div class="logo-notificao">
                    <div class="icon-notificao">
                        <img src="./../../assets/dashboard-icons/notificao.svg" alt="">
                    </div>
                    <div class="qtd-notificao">
                        <img src="./../../assets/dashboard-icons/circulo.svg" alt="">
                        <p class="qtd-notificao">10</p>
                    </div>
                </div>
                <div class="separacao"></div>
                <div class="logo-usuario">
                    <div class="userImg">
                        <img src="./../../assets/dashboard-icons/cirucloUser.svg" alt="">
                    </div>
                    <div class="userInfo">
                        <h2 class="user-name">Matheus Valle</h2>
                        <h3 class="user-cargo">Analista de operações</h3>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <div class="corpoPagina">
        <div class="sidebar">
            <div class="sidebar-buttons">
                <div class="sidebar-button">
                    <img src="../../assets/dashboard-icons/icon_dashboard_azul.svg" alt="">
                    <p>Dashboard</p>
                </div>
                <div class="sidebar-button-select">
                    <img src="../../assets/dashboard-icons/icon_servidores_branco.svg" alt="">
                    <p>Servidores</p>
                </div>
                <div class="sidebar-button">
                    <img src="../../assets/dashboard-icons/icon_alerta_branco.svg" alt="">
                    <p>Alerta</p>
                </div>
                <div class="sidebar-button">
                    <img src="../../assets/dashboard-icons/icon_form_branco.svg" alt="">
                    <p>Funcionario</p>
                </div>
                <div class="sidebar-button">
                    <img src="../../assets/dashboard-icons/icon_config_branco.svg" alt="">
                    <p>Configurações</p>
                </div>
            </div>
        </div>
        <div class="SubcorpoPagina">
            <div class="container_kpis">
                <div class="div_kpi kpi1">
                    <div class="info_kpi">
                        <h3>Total</h3>
                        <h1>8</h1>
                    </div>
                </div>
                <div class="div_kpi kpi2">
                    <div class="info_kpi">
                        <h3>Online</h3>
                        <h1 style="color: #4CAF50;">3</h1>
                    </div>
                </div>
                <div class="div_kpi kpi3">
                    <div class="info_kpi">
                        <h3>Atenção</h3>
                        <h1 style="color: #F5CC4D;">2</h1>
                    </div>
                </div>
                <div class="div_kpi kpi4">
                    <div class="info_kpi">
                        <h3>Critico</h3>
                        <h1 style="color: #FF5252;">2</h1>
                    </div>
                </div>
                <div class="div_kpi kpi4">
                    <div class="info_kpi">
                        <h3>Offline</h3>
                        <h1 style="color: #6B7280;">1</h1>
                    </div>
                </div>
            </div>
            <div class="boxBusca">
                <div class="busca">
                    <input type="text" id="buscaServidor" class="inputComIcone">
                </div>
                <div class="botoes">

                </div>
            </div>
        </div>
    </div>

</body>
</html>
